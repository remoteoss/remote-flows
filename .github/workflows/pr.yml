name: PR Checks

on:
  pull_request:
    branches:
      - main
      - release/*

jobs:
  checks-and-tests:
    name: Checks and Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.14.1'

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci --include=optional --ignore-scripts

      - name: Run checks
        run: npm run build && npm run check-format && npm run check-exports && npm run lint && npm run type-check

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Create output directory
        run: mkdir -p out

      - name: Extract current coverage
        run: npm run coverage:extract -- --output out/current-coverage.json

      - name: Upload current coverage
        uses: actions/upload-artifact@v6
        with:
          name: current-coverage
          path: out/current-coverage.json
          retention-days: 1

  example-checks:
    name: Example App Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.14.1'

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install main package dependencies
        run: npm ci --include=optional --ignore-scripts

      - name: Build main package
        run: npm run build

      - name: Install example dependencies
        working-directory: ./example
        run: npm ci --include=optional --ignore-scripts

      - name: Lint example app
        working-directory: ./example
        run: npm run lint

      - name: Type-check example app
        working-directory: ./example
        run: npm run type-check

  coverage-compare:
    name: Compare Coverage
    runs-on: ubuntu-latest
    needs: checks-and-tests
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.14.1'

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci --include=optional --ignore-scripts

      - name: Download current coverage
        uses: actions/download-artifact@v8
        with:
          name: current-coverage
          path: out

      - name: Check if coverage scripts exist
        id: check-scripts
        run: |
          if [ -f "scripts/compare-coverage.ts" ] && [ -f "scripts/extract-coverage.ts" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup base branch worktree and run coverage
        if: steps.check-scripts.outputs.exists == 'true'
        run: |
          # Create worktree for base branch
          git worktree add ../base-branch origin/${{ github.base_ref }}

          cd ../base-branch

          # Check if scripts exist in base
          if [ ! -f "scripts/compare-coverage.ts" ] || [ ! -f "scripts/extract-coverage.ts" ]; then
            echo "Coverage scripts not found in base branch, skipping"
            exit 0
          fi

          # Install deps and run tests in worktree
          npm ci --include=optional --ignore-scripts
          npm run test:coverage
          npm run coverage:extract -- --output out/base-coverage.json

          # Copy base coverage back to main workspace
          cp out/base-coverage.json $GITHUB_WORKSPACE/out/base-coverage.json

      - name: Compare coverage
        id: compare
        run: |
          # Run comparison (handles missing base file gracefully)
          npm exec tsx scripts/compare-coverage.ts out/current-coverage.json out/base-coverage.json > out/coverage-report.md 2>&1 || true

          # Set output for PR comment
          echo "report<<EOF" >> $GITHUB_OUTPUT
          cat out/coverage-report.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post PR comment
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const report = process.env.COVERAGE_REPORT;

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('📊 Coverage Report')
            );

            const commentBody = report;

            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody
              });
            }
        env:
          COVERAGE_REPORT: ${{ steps.compare.outputs.report }}

      - name: Cleanup worktree
        if: always() && steps.check-scripts.outputs.exists == 'true'
        run: |
          git worktree remove ../base-branch --force || true

      - name: Upload coverage analysis
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: coverage-analysis
          path: |
            out/current-coverage.json
            out/base-coverage.json
            out/coverage-report.md
          retention-days: 30

  deploy-remote-flows:
    name: Deploy Remote Flows Preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Deploy remote-flows to vercel
        id: vercel-remote-flows
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_REMOTE_FLOWS_PROJECT_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-comment: true
          scope: ${{ secrets.VERCEL_ORG_ID }}

      - name: Save deployment URL
        run: |
          echo "${{ steps.vercel-remote-flows.outputs.preview-url }}" > remote-flows-url.txt

      - name: Upload deployment URL
        uses: actions/upload-artifact@v6
        with:
          name: remote-flows-url
          path: remote-flows-url.txt

  deploy-example-app:
    name: Deploy Example App Preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Deploy remote-flows-example-app to vercel
        id: vercel-example-app
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_EXAMPLE_APP_PROJECT_ID }}
          scope: ${{ secrets.VERCEL_ORG_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-comment: true

      - name: Save deployment URL
        run: |
          echo "${{ steps.vercel-example-app.outputs.preview-url }}" > example-app-url.txt

      - name: Upload deployment URL
        uses: actions/upload-artifact@v6
        with:
          name: example-app-url
          path: example-app-url.txt

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs:
      [
        checks-and-tests,
        example-checks,
        deploy-remote-flows,
        deploy-example-app,
      ]
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.14.1'

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install main package dependencies
        run: npm ci --include=optional --ignore-scripts

      - name: Install example/ dependencies
        working-directory: ./example
        run: npm ci --include=optional --ignore-scripts

      - name: Install Playwright
        working-directory: ./example
        run: npx playwright install chromium --with-deps

      - name: Download remote-flows URL
        uses: actions/download-artifact@v8
        with:
          name: remote-flows-url

      - name: Download example-app URL
        uses: actions/download-artifact@v8
        with:
          name: example-app-url

      - name: Set deployment URLs
        id: set-urls
        run: |
          echo "REMOTE_FLOWS_URL=$(cat remote-flows-url.txt)" >> $GITHUB_ENV
          echo "EXAMPLE_APP_URL=$(cat example-app-url.txt)" >> $GITHUB_ENV

      - name: Run Playwright tests
        env:
          BASE_URL: ${{ env.REMOTE_FLOWS_URL }}
          VERCEL_BYPASS_TOKEN: ${{ secrets.VERCEL_BYPASS_TOKEN }}
          DEBUG: pw:api
        working-directory: ./example
        run: npx playwright test --project=chromium

      - uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
